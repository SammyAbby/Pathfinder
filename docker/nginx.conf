server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip the text assets (JS/CSS/HTML/SVG).
    gzip              on;
    gzip_types        text/css application/javascript image/svg+xml;
    gzip_min_length   256;

    # HTML: always revalidate so updates are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Static JS/CSS: short cache. Bump the tag/redeploy to invalidate.
    location ~* \.(?:js|css|svg)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
